# mini-claw 配置文件

# 工作目录
workspace_dir: ./workspace

# LLM 提供商配置
models:
  providers:
    deepseek:
      api_key: ${DEEPSEEK_API_KEY}
      base_url: https://api.deepseek.com
      models:
        - deepseek-chat
        - deepseek-coder

    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: https://api.openai.com/v1
      models:
        - gpt-4o
        - gpt-4o-mini
        - o1

    ollama:
      base_url: http://localhost:11434/v1
      api_key: ollama
      models:
        - llama3.2
        - qwen2.5
        - qwen2.5:7b

    qwen:
      api_key: ${DASHSCOPE_API_KEY}
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      models:
        - qwen-plus
        - qwen-max
        - qwen-turbo

# Agent 配置
agents:
  defaults:
    model: qwen-plus
    temperature: 0.7
    max_tokens: 4096

    # 记忆配置
    memory:
      enabled: true
      vector_enabled: false  # 向量检索（可选，需要sentence-transformers）
      embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

    # 子 Agent 配置
    subagents:
      max_spawn_depth: 2
      max_children_per_agent: 5

    # 心跳配置
    heartbeat:
      enabled: true
      interval_minutes: 30

  list:
    - id: main
      name: Assistant
      description: 默认通用助手
      model: qwen-plus

# 工具配置
tools:
  # 文件系统
  fs:
    workspace_only: true
    readonly_dirs:
      - docs

  # Web 工具
  web:
    search:
      provider: duckduckgo

# 记忆搜索配置
memory_search:
  fts5:
    enabled: true
  vector:
    enabled: false
  hybrid:
    enabled: false
